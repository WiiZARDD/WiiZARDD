<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="470" viewBox="0 0 1200 470" role="img" aria-labelledby="title desc">
  <title id="title">WiiZARDD — Joker system interface</title>
  <desc id="desc">A dark terminal-inspired profile banner for WiiZARDD and Joker Obfuscator.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#050505"/>
      <stop offset="0.55" stop-color="#0a0710"/>
      <stop offset="1" stop-color="#050505"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#a3ff12"/>
      <stop offset="0.52" stop-color="#7c3aed"/>
      <stop offset="1" stop-color="#d946ef"/>
    </linearGradient>
    <radialGradient id="violetGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#7c3aed" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-opacity="0.055" stroke-width="1"/>
    </pattern>
    <filter id="softGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="titleGlow" x="-15%" y="-30%" width="130%" height="160%">
      <feGaussianBlur stdDeviation="1.6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="frameClip">
      <rect x="16" y="16" width="1168" height="438" rx="18"/>
    </clipPath>
    <style>
      text { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace; }
      .micro { font-size: 12px; letter-spacing: 2.4px; }
      .label { font-size: 11px; letter-spacing: 1.7px; fill: #77727f; }
      .value { font-size: 14px; letter-spacing: 0.7px; fill: #e9e7ed; }
      .blink { animation: blink 1.1s steps(1, end) infinite; }
      .pulse { animation: pulse 2.2s ease-in-out infinite; transform-origin: center; }
      .scan { animation: scan 7s linear infinite; }
      @keyframes blink { 0%, 48% { opacity: 1; } 49%, 100% { opacity: 0; } }
      @keyframes pulse { 0%, 100% { opacity: .45; } 50% { opacity: 1; } }
      @keyframes scan { from { transform: translateY(-500px); } to { transform: translateY(500px); } }
      @media (prefers-reduced-motion: reduce) { .blink, .pulse, .scan { animation: none; } }
    </style>
  </defs>

  <rect width="1200" height="470" fill="url(#bg)"/>
  <g clip-path="url(#frameClip)">
    <rect x="16" y="16" width="1168" height="438" fill="url(#grid)"/>
    <ellipse cx="940" cy="185" rx="360" ry="290" fill="url(#violetGlow)"/>
    <rect class="scan" x="0" y="-14" width="1200" height="2" fill="#a3ff12" opacity="0.09"/>

    <!-- decorative circuitry -->
    <g fill="none" stroke="#7c3aed" stroke-opacity="0.25" stroke-width="1">
      <path d="M760 74h104l18 18h108"/>
      <path d="M835 405h130l22-22h119"/>
      <path d="M1094 126v58l-17 17v48"/>
      <path d="M738 344h54l18-18h84"/>
    </g>
    <g fill="#a3ff12" opacity="0.75">
      <circle cx="760" cy="74" r="2.5"/>
      <circle cx="990" cy="92" r="2.5"/>
      <circle cx="835" cy="405" r="2.5"/>
      <circle cx="1106" cy="383" r="2.5"/>
    </g>

    <!-- frame index -->
    <text x="46" y="52" class="micro" fill="#a3ff12">JOKER // SYSTEM INTERFACE</text>
    <text x="1153" y="52" text-anchor="end" class="micro" fill="#8d8795">NODE 0x57</text>
    <circle cx="1018" cy="48" r="5" fill="#a3ff12" filter="url(#softGlow)" class="pulse"/>
    <text x="1004" y="52" text-anchor="end" class="micro" fill="#a3ff12">ONLINE</text>

    <!-- main identity -->
    <text x="62" y="142" font-size="14" letter-spacing="4" fill="#8d8795">BUILDER / OPERATOR / SECURITY-MINDED</text>
    <text x="58" y="226" font-size="82" font-weight="800" letter-spacing="-4" fill="#7c3aed" opacity="0.18">WiiZARDD</text>
    <text x="62" y="222" font-size="82" font-weight="800" letter-spacing="-4" fill="#f5f4f7" filter="url(#titleGlow)">WiiZARDD</text>
    <rect x="64" y="245" width="530" height="3" rx="1.5" fill="url(#accent)"/>
    <text x="62" y="286" font-size="20" letter-spacing="1.3" fill="#e9e7ed">EXECUTION-LEVEL THINKING.</text>
    <text x="62" y="318" font-size="20" letter-spacing="1.3" fill="#e9e7ed">SHIPPING REAL SYSTEMS.</text>

    <!-- right status module -->
    <g transform="translate(744 112)">
      <rect width="390" height="228" rx="14" fill="#09090b" fill-opacity="0.83" stroke="#ffffff" stroke-opacity="0.09"/>
      <rect x="0" y="0" width="5" height="228" rx="2.5" fill="url(#accent)"/>
      <text x="28" y="34" class="micro" fill="#a3ff12">ACTIVE BUILD</text>
      <line x1="28" y1="49" x2="360" y2="49" stroke="#ffffff" stroke-opacity="0.08"/>

      <text x="28" y="79" class="label">PRIMARY SYSTEM</text>
      <text x="28" y="101" class="value">JOKER OBFUSCATOR</text>

      <text x="28" y="132" class="label">OBJECTIVE</text>
      <text x="28" y="154" class="value">PROTECT · HARDEN · SHIP</text>

      <text x="28" y="185" class="label">OPERATING MODE</text>
      <text x="28" y="207" class="value">BUILDING / ITERATING / SCALING</text>

      <g transform="translate(320 74)">
        <rect width="40" height="54" rx="8" fill="#0d0b12" stroke="#7c3aed" stroke-opacity="0.65"/>
        <text x="20" y="22" text-anchor="middle" font-size="15" font-weight="700" fill="#d8b4fe">J</text>
        <path d="M11 38l9-7 9 7-9 7z" fill="#a3ff12" opacity="0.9"/>
      </g>
    </g>

    <!-- terminal strip -->
    <g transform="translate(62 378)">
      <rect width="672" height="48" rx="10" fill="#050506" stroke="#ffffff" stroke-opacity="0.08"/>
      <circle cx="22" cy="24" r="4" fill="#a3ff12" opacity="0.9"/>
      <text x="40" y="29" font-size="14" fill="#8d8795">root@wiizardd:~$</text>
      <text x="193" y="29" font-size="14" fill="#f4f2f6">./build --real --secure --ship</text>
      <rect x="463" y="16" width="8" height="17" fill="#a3ff12" class="blink"/>
    </g>

    <text x="1138" y="421" text-anchor="end" class="micro" fill="#6f6977">JOKEROBFUSCATOR.COM</text>
  </g>

  <rect x="16.5" y="16.5" width="1167" height="437" rx="18" fill="none" stroke="#ffffff" stroke-opacity="0.12"/>
  <path d="M17 72V34a17 17 0 0 1 17-17h84" fill="none" stroke="#a3ff12" stroke-width="2"/>
  <path d="M1183 398v38a17 17 0 0 1-17 17h-84" fill="none" stroke="#7c3aed" stroke-width="2"/>
</svg>
